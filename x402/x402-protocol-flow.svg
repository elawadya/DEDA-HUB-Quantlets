<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" font-family="'Segoe UI', Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="560" fill="#f9fafb" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">x402 Payment Protocol — Message Flow</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#6b7280">HTTP 402 · EIP-712 · EIP-3009 · USDC on Base</text>

  <!-- ── Actor boxes ── -->
  <!-- Client -->
  <rect x="50" y="80" width="130" height="60" rx="8" fill="#3b82f6" />
  <text x="115" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="white">Client</text>
  <text x="115" y="124" text-anchor="middle" font-size="10" fill="#bfdbfe">(Buyer / AI Agent)</text>

  <!-- Resource Server -->
  <rect x="270" y="80" width="130" height="60" rx="8" fill="#f59e0b"/>
  <text x="335" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="white">Resource Server</text>
  <text x="335" y="124" text-anchor="middle" font-size="10" fill="#fef3c7">(FastAPI + @x402_gate)</text>

  <!-- Facilitator -->
  <rect x="490" y="80" width="130" height="60" rx="8" fill="#10b981"/>
  <text x="555" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="white">Facilitator</text>
  <text x="555" y="124" text-anchor="middle" font-size="10" fill="#d1fae5">(Coinbase CDP)</text>

  <!-- Blockchain -->
  <rect x="710" y="80" width="130" height="60" rx="8" fill="#8b5cf6"/>
  <text x="775" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="white">Blockchain</text>
  <text x="775" y="124" text-anchor="middle" font-size="10" fill="#ede9fe">(Base / Anvil)</text>

  <!-- ── Lifelines ── -->
  <line x1="115" y1="140" x2="115" y2="520" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="335" y1="140" x2="335" y2="520" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="555" y1="140" x2="555" y2="520" stroke="#6ee7b7" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="775" y1="140" x2="775" y2="520" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ── Helper: arrow marker definitions ── -->
  <defs>
    <marker id="arrowBlue"   markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowAmber"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="arrowGreen"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowGray"   markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- ── Step labels helper: white pill background ── -->

  <!-- ① GET /resource  Client → Server -->
  <line x1="122" y1="180" x2="326" y2="180" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="175" y="163" width="110" height="18" rx="4" fill="white" opacity="0.9"/>
  <text x="230" y="176" text-anchor="middle" font-size="11" fill="#1d4ed8">① GET /resource</text>

  <!-- ② 402 + PAYMENT-REQUIRED  Server → Client -->
  <line x1="326" y1="215" x2="122" y2="215" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <rect x="148" y="197" width="166" height="20" rx="4" fill="white" opacity="0.9"/>
  <text x="231" y="211" text-anchor="middle" font-size="11" fill="#92400e">② 402 + PAYMENT-REQUIRED</text>

  <!-- signing note -->
  <rect x="50" y="232" width="130" height="30" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="115" y="248" text-anchor="middle" font-size="10" fill="#1e40af" font-style="italic">sign EIP-712</text>
  <text x="115" y="259" text-anchor="middle" font-size="10" fill="#1e40af" font-style="italic">TransferWithAuth</text>

  <!-- ③ GET + PAYMENT-SIGNATURE  Client → Server -->
  <line x1="122" y1="282" x2="326" y2="282" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="148" y="264" width="166" height="20" rx="4" fill="white" opacity="0.9"/>
  <text x="231" y="278" text-anchor="middle" font-size="11" fill="#1d4ed8">③ GET + PAYMENT-SIGNATURE</text>

  <!-- ④ POST /verify  Server → Facilitator -->
  <line x1="342" y1="317" x2="547" y2="317" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <rect x="386" y="299" width="118" height="20" rx="4" fill="white" opacity="0.9"/>
  <text x="445" y="313" text-anchor="middle" font-size="11" fill="#92400e">④ POST /verify</text>

  <!-- ⑤ transferWithAuthorization  Facilitator → Blockchain -->
  <line x1="562" y1="352" x2="767" y2="352" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="580" y="333" width="172" height="20" rx="4" fill="white" opacity="0.9"/>
  <text x="666" y="347" text-anchor="middle" font-size="11" fill="#065f46">⑤ transferWithAuthorization</text>

  <!-- ⑥ tx receipt  Blockchain → Facilitator -->
  <line x1="767" y1="387" x2="562" y2="387" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="617" y="369" width="108" height="20" rx="4" fill="white" opacity="0.9"/>
  <text x="671" y="383" text-anchor="middle" font-size="11" fill="#5b21b6">⑥ tx receipt</text>

  <!-- ⑦ {success, tx_hash}  Facilitator → Server -->
  <line x1="547" y1="422" x2="342" y2="422" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="374" y="404" width="148" height="20" rx="4" fill="white" opacity="0.9"/>
  <text x="448" y="418" text-anchor="middle" font-size="11" fill="#065f46">⑦ {success, tx_hash}</text>

  <!-- ⑧ 200 OK + resource  Server → Client -->
  <line x1="326" y1="457" x2="122" y2="457" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <rect x="155" y="439" width="148" height="20" rx="4" fill="white" opacity="0.9"/>
  <text x="229" y="453" text-anchor="middle" font-size="11" fill="#92400e">⑧ 200 OK + resource</text>

  <!-- ── Legend ── -->
  <rect x="50" y="492" width="800" height="40" rx="8" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="66"  y="505" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="84"  y="515" font-size="11" fill="#374151">Client</text>
  <rect x="146" y="505" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="164" y="515" font-size="11" fill="#374151">Server</text>
  <rect x="226" y="505" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="244" y="515" font-size="11" fill="#374151">Facilitator</text>
  <rect x="316" y="505" width="12" height="12" rx="2" fill="#8b5cf6"/>
  <text x="334" y="515" font-size="11" fill="#374151">Blockchain</text>
  <text x="570" y="515" font-size="11" fill="#6b7280">Buyer pays zero gas — facilitator covers on-chain fees · Settlement: ~2 s on Base</text>

</svg>
